<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiet san pham | Milktea House</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tea: "#0f766e",
            cream: "#fff8ea",
            berry: "#be123c",
            honey: "#f59e0b"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-cream text-slate-900">
  <header class="border-b border-teal-900/10 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a href="index.html" class="text-xl font-black text-tea">Milktea House</a>
      <div class="flex items-center gap-3">
        <div id="memberBadge" class="hidden text-right text-xs sm:block"></div>
        <a href="index.html#san-pham" class="rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold hover:border-tea hover:text-tea">Ve trang chu</a>
        <button id="logoutBtn" class="rounded-md bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-tea">Logout</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <div id="productDetail"></div>
    <section class="mt-12">
      <div class="flex items-end justify-between gap-4">
        <div>
          <p class="text-sm font-bold uppercase tracking-[0.16em] text-berry">Cung danh muc</p>
          <h2 class="mt-2 text-3xl font-black">San pham tuong tu</h2>
        </div>
        <a href="index.html#san-pham" class="hidden text-sm font-semibold text-tea sm:inline">Xem tat ca</a>
      </div>
      <div id="relatedProducts" class="mt-6 grid gap-5 sm:grid-cols-2 lg:grid-cols-4"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
